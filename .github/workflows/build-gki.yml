name: Build Custom GKI Kernel for Xiaomi 13 Pro

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel
    runs-on: self-hosted
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo apt-get clean
        df -h

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev libc6-dev-i386 x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig

    - name: Setup repo tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Initialize and Sync Kernel Source
      run: |
        mkdir -p ~/kernel_workspace
        cd ~/kernel_workspace
        repo init -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15 --depth=1
        repo sync -c -j$(nproc) --no-clone-bundle --no-tags --no-clone-bundle

    - name: Apply SUSFS v2.1.0+ Patches
      run: |
        cd ~/kernel_workspace
        if [ ! -d "susfs4ksu" ]; then
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android13-5.15
        fi
        cd common
        cp -rv ../susfs4ksu/kernel_patches/fs/* fs/ || true
        cp -rv ../susfs4ksu/kernel_patches/include/linux/* include/linux/ || true
        
        # Откатываем файлы перед патчем (кэш)
        git reset --hard HEAD
        git clean -fdx
        
        # Применяем патч (игнорируем ошибки hunks)
        patch -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android13-5.15.patch || true
        
        # Ручной фикс для fs/namespace.c (Hunk #1)
        sed -i 's/#include "pnode.h"/#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n#include <linux\/susfs_def.h>\n#endif\n\n#include "pnode.h"/g' fs/namespace.c
        sed -i 's/#include "internal.h"/#include "internal.h"\n\n#ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\nextern bool susfs_is_current_ksu_domain(void);\nextern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;\n\n#define CL_COPY_MNT_NS BIT(25)\n#endif/g' fs/namespace.c
        
        # Ручной фикс для fs/proc/task_mmu.c (Hunk #1)
        sed -i 's/#include <asm\/elf.h>/#if defined(CONFIG_KSU_SUSFS_SUS_KSTAT) || defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)\n#include <linux\/susfs_def.h>\n#endif\n\n#include <asm\/elf.h>/g' fs/proc/task_mmu.c

    - name: Apply Sukisu Ultra
      run: |
        cd ~/kernel_workspace/common
        curl -LSs "https://raw.githubusercontent.com/sukisu-ultra/sukisu-ultra/main/kernel/setup.sh" | bash -

    - name: Apply Networking and Wild GKI Features
      run: |
        cd ~/kernel_workspace/common
        
        # Обход строгой проверки defconfig (как делает Wild GKI)
        sed -i 's/check_defconfig//' build.config.gki
        
        # Добавляем нужные нам модули в конфиг (BBR, Wireguard и т.д.)
        cat <<EOF >> arch/arm64/configs/gki_defconfig

        # --- Wild GKI Networking & Features ---
        CONFIG_TCP_CONG_BBR=y
        CONFIG_DEFAULT_BBR=y
        CONFIG_WIREGUARD=y
        CONFIG_IP_SET=y
        CONFIG_IP_SET_MAX=256
        CONFIG_IP_SET_BITMAP_IP=y
        CONFIG_IP_SET_BITMAP_IPMAC=y
        CONFIG_IP_SET_BITMAP_PORT=y
        CONFIG_IP_SET_HASH_IP=y
        CONFIG_IP_SET_HASH_IPMARK=y
        CONFIG_IP_SET_HASH_IPPORT=y
        CONFIG_IP_SET_HASH_IPPORTIP=y
        CONFIG_IP_SET_HASH_IPPORTNET=y
        CONFIG_IP_SET_HASH_MAC=y
        CONFIG_IP_SET_HASH_NETPORTNET=y
        CONFIG_IP_SET_HASH_NET=y
        CONFIG_IP_SET_HASH_NETNET=y
        CONFIG_IP_SET_HASH_NETPORT=y
        CONFIG_IP_SET_HASH_NETIFACE=y
        CONFIG_IP_SET_LIST_SET=y
        CONFIG_IP6_NF_NAT=y
        CONFIG_NETFILTER_XT_TARGET_HL=y
        CONFIG_NETFILTER_XT_MATCH_HL=y
        
        # --- File System Features ---
        CONFIG_TMPFS_XATTR=y
        CONFIG_TMPFS_POSIX_ACL=y
        CONFIG_NTFS3_FS=y
        CONFIG_NTFS3_LZX_XPRESS=y
        CONFIG_NTFS3_FS_POSIX_ACL=y
        CONFIG_EXFAT_FS=y
        CONFIG_EXFAT_DEFAULT_IOCHARSET="utf8"
        
        # --- Memory Management (MGLRU & DAMON) ---
        CONFIG_LRU_GEN=y
        CONFIG_LRU_GEN_ENABLED=y
        CONFIG_DAMON=y
        CONFIG_DAMON_VADDR=y
        CONFIG_DAMON_PADDR=y
        CONFIG_DAMON_SYSFS=y
        CONFIG_DAMON_RECLAIM=y
        CONFIG_DAMON_LRU_SORT=y
        
        # --- Disable Debugs (Performance Boost) ---
        CONFIG_PROVE_LOCKING=n
        CONFIG_DEBUG_KMEMLEAK=n
        CONFIG_DEBUG_SPINLOCK=n
        CONFIG_DEBUG_MUTEXES=n
        CONFIG_SCHED_DEBUG=n
        CONFIG_DEBUG_PREEMPT=n
        EOF

    - name: Build the Kernel
      run: |
        cd ~/kernel_workspace
        # Так как исходники лежат в ~/kernel_workspace, кэш Bazel сохраняется автоматически!
        LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh

    - name: Package with AnyKernel3
      run: |
        cd ~/kernel_workspace
        if [ ! -d "AnyKernel3" ]; then
          git clone https://github.com/osm0sis/AnyKernel3.git -b master AnyKernel3
        fi
        
        # Удаляем лишнее
        rm -rf AnyKernel3/.git AnyKernel3/README.md AnyKernel3/*placeholder
        
        # Настраиваем anykernel.sh для GKI
        sed -i 's/kernel.string=.*/kernel.string=Custom GKI 5.15 (SukiSU-Ultra + SUSFS) /' AnyKernel3/anykernel.sh
        sed -i 's/do.devicecheck=1/do.devicecheck=0/' AnyKernel3/anykernel.sh
        sed -i 's/block=.*/block=auto/' AnyKernel3/anykernel.sh
        
        # Копируем скомпилированный образ (Image)
        cp out/mixed/dist/Image AnyKernel3/
        
        # Собираем ZIP
        cd AnyKernel3
        zip -r9 ../AnyKernel3-Xiaomi-13-Pro-GKI-5.15.zip *

    - name: Upload AnyKernel3 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-Xiaomi-13-Pro-GKI-5.15
        path: ~/kernel_workspace/AnyKernel3-Xiaomi-13-Pro-GKI-5.15.zip
