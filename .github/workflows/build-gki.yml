name: Build Custom GKI Kernel

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Target Device'
        required: true
        default: 'Xiaomi-13-Pro'
        type: choice
        options:
          - Xiaomi-13-Pro
          - Xiaomi-14T-Pro
      kmi_version:
        description: 'Specific KMI Branch (e.g. common-android14-6.1-2024-04). Leave empty for latest.'
        required: false
        default: ''
      target_commit:
        description: 'Exact kernel commit hash (e.g. bf0a7f319). Leave empty for HEAD.'
        required: false
        default: 'bf0a7f319'

jobs:
  build:
    name: Build Kernel
    runs-on: self-hosted
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Run Unified Build Script
      run: |
        chmod +x ./build.sh
        ./build.sh "${{ github.event.inputs.device }}" "${{ github.event.inputs.target_commit }}" "${{ github.event.inputs.kmi_version }}"

    - name: Upload AnyKernel3 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-${{ github.event.inputs.device }}-GKI
        path: ~/kernel_workspace/AnyKernel3/
